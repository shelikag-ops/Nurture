    id: 17, title: "The Boy Who Harnessed the Wind", subtitle: "A true story from Malawi",
    theme: "hardwork", themeLabel: "Hard Work & Ingenuity",
    body: `<p>In 2001, in a small farming village in Malawi called Masitala, a fourteen-year-old boy named William Kamkwamba was forced to drop out of school. His family could not afford the $80 annual tuition fee. In a country where drought had destroyed the maize crop and families were starving, $80 might as well have been $80,000.</p>
<p>Most boys in William's situation would have resigned themselves to working the fields. And William did work the fields. But he also did something else: he kept going to the library. The small community library near his village had a collection of donated books, many of them in English, a language William barely spoke. He went anyway. He looked at the pictures. He puzzled out the words. And one day, he found a textbook called "Using Energy" with a photograph on the cover that changed his life: a windmill.</p>
<p>William studied that photograph the way a hungry person studies a recipe. He read every word he could understand and guessed at the rest. He learned that a windmill could generate electricity, and electricity could power a water pump, and a water pump could irrigate fields, and irrigated fields could grow food even when the rains failed. Each step was a link in a chain, and the chain connected a photograph in a book to the survival of his family.</p>
<p>He decided to build one. He had no money, no training, no tools, and no materials. He had a library book and a stubbornness that his mother later described as "a kind of sickness — he could not stop."</p>
<p>William began scavenging. He collected a broken bicycle from a scrapyard. He pulled a tractor fan blade from a pile of junk. He fashioned a rotor shaft from a discarded shock absorber. He melted PVC pipes over a fire and flattened them into blade shapes. When he needed a dynamo to generate electricity, he took apart an old bicycle dynamo, studied how it worked, and reassembled it.</p>
<p>His neighbors thought he had lost his mind. They called him "misala" — crazy. Even his mother was worried. But William kept building, day after day, in the dusty yard behind his family's house. He made mistakes constantly. The blades broke. The tower swayed. The wiring short-circuited. Each failure sent him back to the library, back to the textbook, back to the diagram of that windmill on the cover.</p>
<p>After weeks of work, William hoisted his windmill onto a rickety tower made of blue gum trees lashed together with rope. It was ugly. It was shaky. And when the wind blew, the bicycle wheel turned, the dynamo spun, and a small LED light — connected by wires to the dynamo — flickered on.</p>
<p>William had created electricity. In a village with no power grid, no running water, and no hope of either, a fourteen-year-old boy with a library book and a pile of junk had made light.</p>
<p>Word spread. Journalists came. Then educators. Then engineers. William was eventually invited to speak at a TED conference, where he stood before a thousand people and said, in halting English, "I tried, and I made it." The audience gave him a standing ovation. He went on to attend college, and returned to Malawi to build larger windmills that now power water pumps irrigating his village's fields.</p>`,
    moral: "Hard work isn't just about effort — it's about resourcefulness. William didn't wait for perfect conditions. He built something extraordinary from what he had: a broken bicycle, a library book, and the refusal to accept that his situation was permanent.",
    reflection: "What resources do you already have that you might be underestimating? A library card, internet access, a skill, a person who believes in you? What could you build with what's already in your hands?"
  },
  {
    id: 18, title: "The Giving Tree's Real Lesson", subtitle: "A story about one-sided giving",
    theme: "kindness", themeLabel: "Kindness & Boundaries",
    body: `<p>There was a girl named Devi who was the kindest person in her class. Everyone knew this. If you forgot your lunch, Devi shared hers. If you needed help with homework, Devi stayed late. If you were sad, Devi listened. She was the person everyone turned to, the one who never said no, the one whose door was always open.</p>
<p>At first, being kind felt wonderful. There's a warmth that comes from helping someone — a glow in your chest, a feeling of mattering. Devi loved that feeling. She chased it. She said yes to everything. She helped with projects that weren't hers. She lent money she couldn't afford to lend. She listened to problems at midnight when she had a test the next morning.</p>
<p>But somewhere around the middle of eighth grade, the glow started to flicker. Devi noticed that the people she helped didn't always help her back. When she was sick, the classmates she had tutored didn't bring her notes. When she was sad, the friends she had consoled didn't ask what was wrong. When she needed to borrow something, the people who had borrowed from her were suddenly unavailable.</p>
<p>She didn't say anything. Kind people don't complain, she told herself. Kind people give without expecting anything in return. She doubled down, helping more, giving more, stretching herself thinner and thinner until she felt like a rubber band about to snap.</p>
<p>It was her aunt, Meena Maasi, who noticed. Meena Maasi was a social worker who had spent thirty years helping people in difficult situations, and she recognized the pattern immediately. One evening, she sat down with Devi and said, "Tell me something. When you're on an airplane, what do the safety instructions say about oxygen masks?"</p>
<p>Devi blinked. "Put on your own mask before helping others."</p>
<p>"Why do they say that?"</p>
<p>"Because if you pass out, you can't help anyone."</p>
<p>Meena Maasi nodded. "Devi, you are one of the kindest people I know. But you have confused kindness with self-erasure. Kindness does not mean giving until you have nothing left. It does not mean saying yes when your body is screaming no. It does not mean being available to everyone at the cost of being available to yourself."</p>
<p>She continued: "True kindness has boundaries. A well with no walls eventually collapses. The water doesn't disappear — the structure that held it does. You are the structure, Devi. You need walls — not to keep people out, but to keep yourself standing so you can keep giving for years and decades, not just until you burn out."</p>
<p>Devi sat with this for a long time. It felt uncomfortable, almost wrong. Wasn't saying no the opposite of kindness? But the more she thought about it, the more she realized that every time she said yes when she meant no, she wasn't being kind. She was being afraid — afraid of being disliked, afraid of not being needed, afraid that without her helpfulness, she was nothing.</p>
<p>Slowly, Devi learned to draw gentle boundaries. She helped with homework, but not after 9 PM on school nights. She lent things, but she also asked for them back. She listened to friends, but she also said, "I'm having a hard day too — can I tell you about it?" Some people drifted away. The ones who stayed were the ones who valued Devi, not just what Devi could do for them.</p>
<p>And here's the part no one tells you: Devi's kindness actually became more powerful after she set boundaries. Because now it was a choice, not a compulsion. Every act of generosity came from a full cup, not an empty one. She could give more because she had more to give.</p>`,
    moral: "Kindness without boundaries is self-destruction wearing a generous mask. The most sustainable kind of kindness comes from someone who knows how to say 'not right now' so they can keep saying 'yes' to the things that truly matter.",
    reflection: "Are there times when you say yes but mean no? What would it feel like to set one small boundary — not to be selfish, but to protect your ability to keep being kind over the long run?"
  },
  {
    id: 19, title: "The Jar of Stones", subtitle: "A parable about what matters",
    theme: "gratitude", themeLabel: "Gratitude & Priorities",
    body: `<p>A professor of philosophy stood before her class with a large, empty glass jar. Without saying a word, she reached under the desk and pulled out a bag of large river stones — smooth, heavy, about the size of a fist. She placed them in the jar, one by one, until no more would fit. She looked at the class and asked, "Is the jar full?"</p>
<p>The students nodded. "Yes."</p>
<p>The professor smiled and reached under the desk again. This time she pulled out a bag of pebbles — small, round, the kind you find on a beach. She poured the pebbles into the jar, shaking it gently so they settled into the spaces between the large stones. She looked at the class again. "Is the jar full?"</p>
<p>The students hesitated, sensing a trick. "Maybe," someone said.</p>
<p>The professor reached under the desk a third time and brought out a bag of fine sand. She poured it into the jar, and the sand trickled into every remaining gap, filling the spaces between the pebbles and the stones. "Now?" she asked.</p>
<p>"Now it's full," the students said.</p>
<p>The professor then produced two cups of tea from behind the desk and poured them into the jar. The liquid seeped through the sand without overflowing. The class laughed.</p>
<p>"Now," the professor said, "I want you to understand what this jar represents. The jar is your life. The large stones are the things that truly matter — your family, your health, your closest friendships, your education, the values you live by. If everything else were lost and only these remained, your life would still be full and meaningful."</p>
<p>"The pebbles are the things that matter but are not essential — your hobbies, your achievements, your favorite possessions. They make life enjoyable, but they are not what give it meaning."</p>
<p>"The sand is the small stuff — the arguments about nothing, the scrolling through social media, the worrying about what someone said, the comparison with others. It fills your time, but it doesn't fill your life."</p>
<p>She paused. "Here is the lesson. If you put the sand in first — if you fill your life with the small, unimportant things — there will be no room for the stones. No room for the people and values that truly matter. But if you put the stones in first, the pebbles and sand will always find a way to fit around them."</p>
<p>A student in the back raised her hand. "What about the tea?"</p>
<p>The professor grinned. "I'm glad you asked. No matter how full your life seems, there is always room to sit down and share a cup of tea with someone you love."</p>
<p>The class sat in silence for a moment. Not because the lesson was complicated — it wasn't. They sat in silence because each of them was thinking about their own jar. How much sand had they poured in lately? How many stones had they neglected? When was the last time they had sat down for tea?</p>`,
    moral: "Gratitude is knowing the difference between the stones and the sand in your life — and choosing to put the stones in first. The small stuff will always find a way to fit. But if you fill your days with sand, you'll look up one day and realize there's no room for what matters.",
    reflection: "What are the 'big stones' in your life — the things that truly matter to you? Are you putting them in first, or are you letting the 'sand' (social media, worrying, small distractions) take up all the space?"
  },
  {
    id: 20, title: "The Elephant Rope", subtitle: "A story about self-belief",
    theme: "selfbelief", themeLabel: "Self-Belief",
    body: `<p>A man was walking through an elephant sanctuary in Thailand when he noticed something that puzzled him. The elephants — enormous, powerful creatures, each one capable of uprooting a tree — were being held in place by nothing more than a thin rope tied to one of their front legs. The rope was attached to a small wooden stake driven into the ground. Any one of these elephants could have snapped the rope with a single tug. But none of them tried.</p>
<p>The man asked the keeper, "Why don't they break free? They're strong enough to pull down a building."</p>
<p>The keeper smiled sadly. "When they were babies," he said, "we used the same size rope to tie them. At that age, the rope was strong enough to hold them. They pulled and pulled, and the rope didn't break. Eventually, they stopped trying. Now they're grown — strong enough to break any rope — but they still believe they can't. The rope isn't holding them. Their belief is."</p>
<p>The man stood there for a long time, watching the elephants. He thought about how strange it was — a creature weighing several thousand kilograms, held captive by a memory. The rope was real, but it was also an illusion. The only thing keeping the elephant in place was a lesson it had learned long ago that was no longer true.</p>
<p>We do this too. Somewhere in your past, someone or something taught you a lesson about what you can't do. Maybe a teacher said you weren't good at math. Maybe a friend said you weren't funny. Maybe you tried something once, failed, and decided that failure was permanent. That experience became your rope. You stopped pulling.</p>
<p>But here's what the elephants don't know: you are not the same person you were when you first pulled on that rope. You are bigger, stronger, smarter, more capable than the child who first heard "you can't." The rope hasn't changed — but you have. And the only thing keeping you tied to that stake is the belief that the old lesson is still true.</p>
<p>Consider the story of a girl named Aisha who was told in third grade that she was "not a math person." Her teacher said it casually, almost offhandedly, during a parent-teacher conference. Aisha overheard. She was eight years old, and the words tied a rope around her that lasted a decade. She avoided math. She chose her classes to minimize it. She told herself, and everyone else, "I'm just not a math person."</p>
<p>Then, in college, she took a statistics course because it was required. The professor was patient and clear, and she began to understand things she had always assumed were beyond her. She worked harder than anyone in the class — not because she was bad at it, but because she was fighting the rope the whole time. She got an A. Then she got another A. Then she changed her major to data science.</p>
<p>The third-grade teacher wasn't wrong about the eight-year-old Aisha. Maybe she was struggling with math that year. But the lesson expired a long time ago. The rope should have been cut years earlier. Instead, Aisha carried it with her, invisible and powerful, until she finally pulled hard enough to snap it.</p>`,
    moral: "The beliefs that hold you back are often not your own — they were given to you by someone else, at a time when you were too young to question them. You have the power to test those old ropes. Pull on them. You might be surprised at how easily they break.",
    reflection: "What's a 'rope' in your life — something you believe about yourself that might not be true anymore? Maybe 'I'm not creative' or 'I'm bad at sports' or 'I'm too shy.' Where did that belief come from? And what would happen if you pulled on it?"
  },
  {
    id: 21, title: "The Starfish Story", subtitle: "Adapted from Loren Eiseley",
    theme: "kindness", themeLabel: "Kindness & Impact",
    body: `<p>An old man was walking along the beach at dawn, just after a violent storm. The tide had retreated, and the sand was covered — for as far as he could see — with thousands upon thousands of starfish. They had been hurled ashore by the waves and now lay stranded, drying in the morning sun. In a few hours, they would all be dead.</p>
<p>The old man walked slowly among them, saddened by the sight. There were so many. The beach stretched for miles, and every inch was covered. It was, by any reasonable measure, a hopeless situation.</p>
<p>Then he noticed a young girl in the distance, near the water's edge. She was picking up starfish, one at a time, and throwing them back into the sea. She would bend down, pick one up, walk to the water, toss it in, then walk back and pick up another. She had been doing this for some time — her footprints in the wet sand traced a path back and forth, back and forth.</p>
<p>The old man watched her for a while, then walked over. "Young lady," he said gently, "there are thousands of starfish on this beach. You can't possibly save them all. There are too many. What you're doing — it can't make a difference."</p>
<p>The girl listened politely. Then she bent down, picked up another starfish, and threw it into the sea. She looked at the old man and said, "It made a difference to that one."</p>
<p>She went back to work.</p>
<p>The old man stood there, watching. Something about her words — their simplicity, their stubborn practicality — caught in his chest. She wasn't trying to solve the whole problem. She wasn't paralyzed by the enormity of it. She had simply decided that if she could help one, she would help one. And then she would help another one. And another.</p>
<p>After a moment, the old man bent down and picked up a starfish. It was cool and rough in his palm, its tiny legs curling. He walked to the water's edge and tossed it in. He picked up another. Then another. A couple walking their dog stopped to watch, then joined in. A family setting up their beach blankets saw the growing group and came over. By mid-morning, there were dozens of people on that beach, picking up starfish and throwing them back into the sea.</p>
<p>They didn't save them all. They couldn't. But every single starfish that made it back to the water was one that would have died. And every person on that beach walked away knowing something that is easy to forget in a world full of enormous problems: you do not need to fix everything. You just need to fix the thing in front of you. And when you do, others will see you, and they will join.</p>`,
    moral: "Never let the size of a problem convince you that your small action doesn't matter. You can't save every starfish on the beach. But the one you pick up — that one's entire world changes. And your example might inspire someone else to bend down and pick up another.",
    reflection: "What's a 'starfish' in your life — a small act of kindness you could do today that might seem insignificant in the grand scheme of things, but would make a real difference to one person?"
  },

    id: 22, title: "The Weight of a Snowflake", subtitle: "A European fable",
    theme: "persistence", themeLabel: "Persistence & Small Actions",
    body: `<p>A dove sat on the branch of a fir tree, watching the snow fall. She was counting the flakes — not out of any scientific purpose, but because she was a thoughtful bird with nothing better to do on a cold winter afternoon.</p>
<p>She had been counting for hours. The number had reached 3,741,952 when a coal tit — a small, cheerful bird with a black cap and bright eyes — landed on the branch beside her.</p>
<p>"What are you doing?" asked the coal tit.</p>
<p>"Counting snowflakes," said the dove.</p>
<p>The coal tit cocked her head. "And you've found this interesting?"</p>
<p>"I've found this instructive," said the dove. "Do you know how much a single snowflake weighs?"</p>
<p>The coal tit thought about it. "Almost nothing. Less than nothing. A snowflake weighs practically zero."</p>
<p>"Precisely," said the dove. "And yet." She nodded toward a great branch of the fir tree — thick as a man's arm, heavy with accumulated snow. As they watched, a single snowflake drifted down from the sky. It landed on the branch with absolute silence, with no impact, with no force whatsoever. And in that same moment, the branch broke. It cracked with a sound like a gunshot and crashed to the ground below, sending up a cloud of white powder.</p>
<p>The coal tit stared. "The branch broke because of that one snowflake?"</p>
<p>"No," said the dove. "The branch broke because of 3,741,953 snowflakes. But it was the last one — the one that weighed almost nothing — that made it happen."</p>
<p>They sat in silence for a while, watching the snow continue to fall. Finally, the coal tit said, "Are we still talking about snow?"</p>
<p>The dove smiled — or did whatever it is that doves do when they are feeling wise. "We were never talking about snow."</p>
<p>This is the truth about persistence that nobody tells you: you almost never see the moment of breakthrough coming. Every snowflake before the last one seemed pointless. The branch looked exactly the same after snowflake number 1,000,000 as it did after number 1. Nothing appeared to be happening. And someone watching from the outside might have said, "Why bother? The snow isn't making any difference."</p>
<p>But underneath the surface, everything was accumulating. Every flake added weight. Every repetition built pressure. And when the breakthrough came — when the branch finally broke — it looked sudden, even though it was the result of millions of individual moments, each one weighing almost nothing.</p>
<p>This is what your practice sessions are. This is what your study hours are. This is what every small kindness, every page read, every difficult conversation, every time you show up when you don't feel like it — this is what they are. They are snowflakes. Individually, they weigh almost nothing. Together, they break branches.</p>`,
    moral: "Never underestimate the power of small, consistent effort. Every repetition, every act of showing up, every seemingly insignificant moment is a snowflake landing on a branch. You may not see the progress. But it's accumulating. And one day, the branch will break.",
    reflection: "What 'snowflakes' are you adding to your life right now — small daily efforts that seem insignificant? Can you trust that they're accumulating, even when you can't see the branch bending?"
  },

    id: 23, title: "The Restaurant of Mistaken Orders", subtitle: "A true story from Tokyo",
    theme: "empathy", themeLabel: "Empathy & Patience",
    body: `<p>In 2017, a restaurant opened in Tokyo with an unusual name: "The Restaurant of Mistaken Orders." The concept was simple and radical: every member of the wait staff had dementia.</p>
<p>The idea came from a television director named Shiro Oguni, who had spent time in a care facility and noticed something that troubled him. The residents with dementia were treated with care and medical precision, but they were also quietly sidelined from the world. They were managed, not engaged. Protected, but not trusted. And in this protection, something essential was taken from them: the feeling of being useful, of contributing, of having a role in the world.</p>
<p>Oguni wondered: what would happen if instead of hiding people's mistakes, you built an entire experience around accepting them? What if a restaurant existed where your order might come out wrong — and that was the whole point?</p>
<p>The restaurant operated for a limited time, and the results were extraordinary. Servers took orders with genuine warmth and effort. Sometimes the food arrived exactly as requested. Sometimes it didn't. A customer who ordered a hamburger might receive a plate of dumplings. Someone who asked for coffee might get orange juice. The "error rate" was about 37 percent.</p>
<p>And the customers loved it. Not in spite of the mistakes, but because of what the mistakes revealed: that the transaction between human beings doesn't need to be perfect to be meaningful. When a server brought the wrong dish, beaming with pride, the customer had a choice. They could be frustrated, or they could see a person — a whole, complex person with a life and a history and a brain that was changing — doing their best. Almost every customer chose the second option.</p>
<p>Something else happened that Oguni didn't expect. The servers with dementia were transformed by the experience. They stood taller. They smiled more. They felt, many of them for the first time in years, that they were part of the world again. One server, a woman in her seventies, told a reporter: "I forgot some things today. But I didn't forget how good it feels to be needed."</p>
<p>The restaurant wasn't really about food. It was about the question: can we create a world where imperfection is not just tolerated but welcomed? Where making mistakes doesn't disqualify you from participation? Where the response to someone getting something wrong is not frustration but patience, not correction but connection?</p>
<p>The answer, served on a plate that might or might not be what you ordered, was yes.</p>`,
    moral: "Empathy means making room for other people's imperfections — not just tolerating them, but seeing the whole person behind the mistake. When someone gets something wrong, you have a choice: you can react to the error, or you can respond to the human being. Choose the human being.",
    reflection: "Think about a time when someone made a mistake that affected you. How did you react? What would it have looked like to respond with empathy instead — to see the person, not just the error?"
  },

    id: 24, title: "The Cracked Water Pot", subtitle: "An ancient Indian fable",
    theme: "humility", themeLabel: "Finding Value in Imperfection",
    body: `<p>A water bearer in India had two large pots, each hung on one end of a pole that he carried across his neck. One pot was perfect — smooth, without a single flaw, and it always delivered a full portion of water from the stream to the master's house. The other pot had a crack in it, and by the time the water bearer arrived home, it had leaked half its water along the path.</p>
<p>For two years, this went on. Every day, the water bearer walked to the stream, filled both pots, and walked back. And every day, the perfect pot arrived full and the cracked pot arrived half-empty. The perfect pot was proud of its accomplishment. The cracked pot was ashamed of its imperfection, miserable that it could only do half of what it was made to do.</p>
<p>One day, the cracked pot spoke to the water bearer. "I am ashamed of myself, and I want to apologize to you."</p>
<p>The water bearer looked at the pot with kind eyes. "Why would you be ashamed?"</p>
<p>"For these past two years, I have only been able to deliver half my load because this crack in my side causes water to leak out all the way back to your master's house. Because of my flaw, you have to do all this work and you don't get full value from your efforts."</p>
<p>The water bearer said, "As we return to the master's house today, I want you to look at the path."</p>
<p>As they walked the familiar route, the cracked pot noticed something it had never seen before — or rather, something it had never allowed itself to see. On its side of the path, the side where the water had been dripping for two years, there was a riot of wildflowers. Reds, purples, yellows, blues — an entire garden stretching along the dusty road, blooming in the otherwise barren landscape. On the other side — the perfect pot's side — there was only dry, brown earth.</p>
<p>"Do you see?" said the water bearer. "I have always known about your crack, and I planted flower seeds on your side of the path. Every day, you watered them without even knowing it. For two years, I have been able to pick these flowers for the master's table. Without you being exactly the way you are, there would be no beauty in this house."</p>
<p>The cracked pot looked at the flowers — this unexpected, unintended garden that it had created simply by being itself, crack and all — and for the first time in two years, it felt something other than shame. It felt wonder. All that time it had been focused on what it couldn't do — deliver a full pot of water — it had been doing something it never imagined: growing a garden.</p>`,
    moral: "Your 'cracks' — the things you see as weaknesses or failures — may be watering flowers you don't even know about. The qualities that make you different from the 'perfect pot' might be the very qualities that create unexpected beauty in the world.",
    reflection: "What's something about yourself that you see as a weakness? Is it possible that this very quality has helped someone or created something beautiful without you realizing it?"
  },

    id: 25, title: "The 10,000-Hour Girl", subtitle: "An original story",
    theme: "hardwork", themeLabel: "Discipline & Dedication",
    body: `<p>Riya's mother was a surgeon. Her father was a software architect. Her older brother had gotten into MIT at sixteen. Every wall in the house held a framed degree, a certificate, or a trophy. The family dinner table was a place where intellectual accomplishments were discussed the way other families discuss the weather.</p>
<p>Riya was smart. But in a family of exceptional, she felt merely ordinary. She got good grades, not great ones. She played violin competently, not brilliantly. She was, in her own words, "the rough draft in a family of final copies."</p>
<p>When Riya was thirteen, she discovered something that changed her relationship with work forever. It was an article about a psychologist named Anders Ericsson, who had studied violinists at a music academy in Berlin. Ericsson had found that the difference between good violinists and world-class ones wasn't talent. It was practice. Specifically, what he called "deliberate practice" — focused, intentional, challenging work on the specific skills you're weakest at.</p>
<p>The good violinists had practiced about 4,000 hours by age twenty. The best violinists had practiced 10,000 hours. The difference wasn't in their genes. It was in their diaries.</p>
<p>Riya was electrified by this idea. Not because she wanted to become a world-class violinist — she didn't particularly love violin. What electrified her was the principle: that mastery wasn't a gift you were born with. It was a decision you made, followed by years of showing up.</p>
<p>She chose coding. Not because her father was a software architect, but because when she wrote her first program — a simple script that sorted a list of numbers — something clicked. The logic was satisfying. The problem-solving was addictive. The feeling of making something that worked from nothing but thought and syntax was, she realized, the feeling she had been looking for.</p>
<p>Riya made a plan. She calculated that if she practiced coding for two hours a day — truly practiced, not just messing around but working on problems at the edge of her ability — she would hit 10,000 hours in about fourteen years, at age twenty-seven. It was a long time. But Ericsson's research told her something powerful: she was going to be twenty-seven anyway. The question was whether she would arrive there with 10,000 hours of mastery, or without it.</p>
<p>She started a journal. Every day, she wrote down what she practiced, what she struggled with, and what she learned. The early entries were simple: "Learned about arrays. Still confused by loops. Practiced for 45 minutes." But as the months passed, they grew more sophisticated: "Built a sorting algorithm from scratch. Execution time too slow — need to learn about time complexity. Practiced for 2 hours."</p>
<p>The hardest part wasn't the work. It was the invisibility. Her brother published a research paper at seventeen. Her parents celebrated. Riya was in her room, debugging a function that refused to return the right value. No one celebrated debugging. No one framed a screenshot of working code.</p>
<p>But Riya kept going. By fifteen, she had built her first app. By sixteen, she was contributing to open-source projects. By seventeen, she had won a coding competition that her brother — brilliant as he was — couldn't have entered, because he had never put in those specific hours. At the dinner table, for the first time, Riya's accomplishments were part of the conversation.</p>
<p>When a cousin asked her how she got so good, Riya showed them her journal. Three years of daily entries. Two thousand one hundred and ninety days. Over four thousand hours of deliberate practice. "That's how," she said. "One hour at a time."</p>`,
    moral: "Discipline is the quiet superpower. It doesn't announce itself. It doesn't win prizes in the early stages. It sits in your room at night, working on problems nobody sees. But over time, it builds something that talent alone never can: deep, unshakeable mastery.",
    reflection: "If you committed to practicing one thing for just 30 minutes a day, every day, for a year — that's over 180 hours. What would you choose? And where might those 180 hours take you?"
  },

    id: 26, title: "The Lantern and the Lighthouse", subtitle: "An original story",
    theme: "responsibility", themeLabel: "Responsibility",
    body: `<p>In a coastal town called Alora, there was a lighthouse that had guided ships safely to harbor for over a hundred years. Its keeper, an old man named Tomás, had tended the light every night for forty of those years. Rain or shine, healthy or sick, Tomás climbed the spiral staircase, trimmed the wick, polished the lens, and made sure the light burned bright until dawn.</p>
<p>One evening, a young woman named Lucía came to visit the lighthouse. She was Tomás's granddaughter, back from university in the city. She was smart, ambitious, and — if she was being honest — slightly bored by the idea of a man spending his life doing the same thing every night.</p>
<p>"Abuelo," she said, sitting on the steps as he polished the lens for the ten thousandth time, "don't you ever get tired of this? It's the same thing, every night. Climb, clean, light. Climb, clean, light. Your whole life."</p>
<p>Tomás finished polishing before he answered. "Do you know what a lighthouse does, Lucía?"</p>
<p>"It shines a light so ships don't crash."</p>
<p>"Yes. But do you know what it really does?" He sat down beside her. "In 1987, there was a storm — the worst this coast has ever seen. Waves as high as this tower. Rain so heavy you couldn't see your hand in front of your face. A fishing boat with twelve men was trying to get home. They had lost their instruments. They couldn't see the coast. They were heading straight for the rocks."</p>
<p>He paused. "I was sick that night. Fever, chills. I could barely stand. My wife — your grandmother — begged me to stay in bed. Just one night, she said. One night won't matter."</p>
<p>"But I climbed. I lit the light. And those twelve men saw it through the rain, and they turned. They found the harbor. They went home to their families. Twelve men. Twelve families. Because I climbed the stairs when I didn't feel like it."</p>
<p>Lucía was quiet for a long time. Then she said, "How did you know the boat was out there?"</p>
<p>"I didn't," Tomás said. "That's the point. I didn't know. I never know, on any given night, whether a ship needs the light. That's what responsibility is, Lucía. It's not doing the important thing when you know it's important. It's doing the thing that might be important, every single time, because the one time you skip might be the one time someone is counting on you."</p>
<p>He looked at the lens, now gleaming. "People think responsibility is a burden. They're wrong. It's a privilege. It means someone, somewhere, is trusting you with their safety. It means your actions matter even when no one is watching. Especially when no one is watching."</p>
<p>Lucía went back to the city the next day. She became an engineer. She designed bridges and buildings. And for the rest of her career, she carried her grandfather's lesson with her: check every measurement twice. Run every safety calculation again. Not because someone is watching. Not because a collapse is likely on any given day. But because the one time you skip — the one bolt you don't check, the one calculation you assume is right — might be the one that twelve families are counting on.</p>`,
    moral: "Responsibility means showing up for the things that matter, even when you're tired, even when you're sick, even when you don't know if anyone needs you that night. Because the one time you skip might be the one time the light was the only thing between someone and the rocks.",
    reflection: "What's your 'lighthouse' — the responsibility you carry that someone else might be depending on, even when you don't realize it? What does it mean to show up for it even on the nights when you don't feel like climbing the stairs?"
  },

    id: 27, title: "The Bamboo and the Fern", subtitle: "A Chinese parable",
    theme: "patience", themeLabel: "Patience & Trust",
    body: `<p>A young man went to his teacher, frustrated. "I've been studying for three years," he said, "and I don't feel like I've made any progress. My classmates are advancing. They're getting opportunities. They're being noticed. I work just as hard as they do — harder, maybe — and nothing is happening for me. I'm beginning to think I'm wasting my time."</p>
<p>The teacher said, "Walk with me." They went to the garden behind the school, where the teacher tended a small plot of plants. He pointed to a fern and a bamboo shoot, both planted at the same time.</p>
<p>"I planted these together, four years ago," the teacher said. "In the first year, I watered both every day. The fern grew quickly — you could see it change week by week. Shoots, fronds, leaves. By the end of the first year, it was a beautiful, full plant. The bamboo, on the other hand, showed nothing. Just a tiny shoot barely breaking the soil."</p>
<p>"In the second year, the fern continued to grow and fill out. The bamboo showed nothing. In the third year, the fern was lush and green. The bamboo showed nothing. By the fourth year, I began to wonder if the bamboo seed was defective. It had been four years. Four years of daily watering, and there was almost nothing to show for it."</p>
<p>The teacher paused and pointed upward. Above them rose a bamboo stalk that towered thirty feet in the air, taller than the school building itself, swaying gently in the breeze.</p>
<p>"In the fifth year," the teacher said quietly, "the bamboo grew ninety feet in six weeks."</p>
<p>The young man stared at the towering stalk. "Ninety feet? In six weeks?"</p>
<p>"Yes. But here is the question I want you to consider: did the bamboo really grow ninety feet in six weeks? Or did it grow ninety feet in five years?"</p>
<p>The young man was silent.</p>
<p>"During those four years when nothing seemed to be happening above ground," the teacher continued, "the bamboo was building its root system. Underground, invisible, it was spreading a massive network of roots — deep, wide, and strong. It was doing the work that would make the explosive growth possible. Without those four years of invisible effort, the bamboo could never have grown ninety feet. It would have toppled under its own weight."</p>
<p>He looked at his student. "You are in your bamboo years. You are building roots. It feels like nothing is happening because you can't see roots. But everything you're learning, every skill you're developing, every struggle you're enduring — it is all going underground, making you strong enough for the growth that is coming."</p>
<p>"The fern grew visibly from day one. And the fern is beautiful. But it will never be thirty feet tall. Only bamboo can do that. And only because it was patient enough to build its roots first."</p>`,
    moral: "Patience means trusting the process when you can't see the results. Your 'bamboo years' — the times when nothing seems to be happening despite your best efforts — are not wasted. They are the years you are building roots. And when the growth finally comes, it will be so fast and so tall that people will think it happened overnight.",
    reflection: "Are you in your 'bamboo years' with something right now — working hard but not seeing results? Can you trust that the roots are growing, even when the surface shows nothing?"
  },
  {
    id: 28, title: "The Last Lecture", subtitle: "Inspired by Randy Pausch's true story",
    theme: "gratitude", themeLabel: "Gratitude & Living Fully",
    body: `<p>In September 2007, a computer science professor at Carnegie Mellon University named Randy Pausch gave a lecture. It was part of a series called "The Last Lecture," where professors were asked to imagine: if this were your last lecture, what would you say? For most professors, it was a thought experiment. For Randy Pausch, it was real. He had been diagnosed with pancreatic cancer and had three to six months to live. He was forty-six years old.</p>
<p>The lecture hall was packed. His wife and three young children sat in the audience. Everyone expected something somber. What they got was something extraordinary: a joyful, funny, deeply moving talk about childhood dreams, gratitude, and how to live a life that matters.</p>
<p>Randy didn't talk about dying. He talked about living. He put up a slide of himself as a child — a grinning boy with big dreams. He had wanted to experience zero gravity. He had wanted to be a Disney Imagineer. He had wanted to write an article for the World Book Encyclopedia. He had wanted to be Captain Kirk. Some of these dreams he had achieved. Some he hadn't. And that, he said, was perfectly fine.</p>
<p>"The brick walls are there for a reason," he told the packed audience. "They're not there to keep us out. They're there to give us a chance to show how badly we want something. The brick walls are there to stop the people who don't want it badly enough."</p>
<p>He talked about his parents — his father, a World War II veteran who never spoke about his service, and his mother, who when told by someone that Randy was "so smart," would reply, "He's not that smart — he just works hard." He was grateful for this. "She taught me that being told you're smart is the most dangerous thing in the world," he said. "Because it makes you think you don't have to try."</p>
<p>He talked about gratitude with a directness that took people's breath away. He was grateful for his wife, for his children, for his career, for his students. He was grateful for the years he had been given, not angry about the years being taken away. "We cannot change the cards we are dealt," he said. "Just how we play the hand."</p>
<p>The most powerful moment came near the end. Randy looked at the audience and said, quietly, "This talk isn't for you. It's for my kids." His three children were one, three, and five years old. They were too young to understand what was happening. He was making this lecture — recording it, preserving it — so that someday, when they were old enough, they could watch their father tell them everything he wanted them to know about living a good life.</p>
<p>Randy Pausch died on July 25, 2008, at the age of forty-seven. His lecture has been viewed over twenty million times. But the people it was made for — his children, Dylan, Logan, and Chloe — will one day watch it and see something the rest of us can't: their father, looking into a camera, looking at them across the years, telling them that a good life is not a long life or an easy life. It's a grateful life. A life lived with intention, humor, and an awareness that every day is a gift you didn't have to receive.</p>`,
    moral: "Gratitude isn't about ignoring what's hard. It's about choosing to focus on what you've been given, even when — especially when — you know it won't last forever. Every day you wake up is a day someone else didn't get. What will you do with it?",
    reflection: "If you had to give a 'last lecture' to the people you love most, what would you want them to know? What would you be most grateful for? And here's the real question: why wait until then to tell them?"
  },

    id: 29, title: "The Boy Who Drew Cats", subtitle: "A Japanese folktale",
    theme: "selfbelief", themeLabel: "Finding Your Strength",
    body: `<p>Long ago in Japan, there was a small boy named Joji who was not good at the things boys were supposed to be good at. He was too small for farm work. He was too dreamy for trade. He forgot his chores. He wandered off during lessons. His father, a practical man who valued hard work and steady hands, didn't know what to do with him.</p>
<p>The one thing Joji could do — the one thing he did constantly, obsessively, everywhere — was draw cats. He drew cats on the margins of his schoolwork. He drew cats in the dirt with sticks. He drew cats on the walls of the house (which did not endear him to his mother). He drew cats on scraps of paper, on the backs of receipts, on anything he could find. His cats were extraordinary — fluid, alive, each one different, each one seeming to breathe on the page.</p>
<p>His father, hoping to channel the boy's energy, sent him to a temple to train as a priest. The old priest at the temple was kind but strict. He taught Joji to read sutras, to meditate, to sweep the temple floors. And Joji tried. He really did. But he kept drawing cats. He drew them on the temple scrolls. He drew them on the meditation screens. He drew them on the wooden walls of the study hall.</p>
<p>One evening, the old priest sat Joji down and said something that confused the boy for years but eventually became the most important sentence of his life: "You will never be a priest. You are an artist. Leave this temple. Go out into the world. And remember this: avoid large places at night. Keep to small ones."</p>
<p>Joji was sent away. Homeless, confused, and ashamed of being dismissed, he wandered until he came to a large, abandoned temple. It was getting dark. He remembered the priest's words — "avoid large places at night; keep to small ones" — but the temple was the only shelter he could find. He went inside.</p>
<p>The temple was vast and empty and cold. Joji found some old screens — large, white, beautiful screens — and he did what he always did when he was scared or lonely or didn't know what else to do: he drew cats. He drew them large and fierce, with arched backs and gleaming eyes, covering every screen in the temple. Then, exhausted, he remembered the priest's advice. Instead of sleeping in the large hall, he found a small cabinet and curled up inside it.</p>
<p>In the middle of the night, he was awakened by terrible sounds — shrieking, crashing, the sound of a great battle. He was too frightened to open the cabinet door. He pressed his hands over his ears and waited.</p>
<p>When dawn came and silence returned, Joji opened the cabinet and stepped into the hall. On the floor lay an enormous goblin rat — a creature that had been terrorizing the region, that warriors and priests had tried and failed to kill. It was dead. And on the screens, Joji's painted cats — every single one of them — had blood on their mouths.</p>
<p>The story says that the cats came alive in the night and killed the goblin. But the deeper truth is this: the thing that everyone told Joji was a weakness — his obsessive, uncontrollable need to draw cats — turned out to be his greatest strength. The very quality that made him a bad farmer and a bad priest made him the person who could do something that no warrior could.</p>`,
    moral: "The thing that makes you different — the interest you can't control, the skill that doesn't seem 'useful,' the passion that others don't understand — might be the exact thing the world needs from you. Don't let anyone convince you that your cats aren't worth drawing.",
    reflection: "What's your version of 'drawing cats' — the thing you love doing that might not seem practical or valued by others? What if that thing is not a distraction from your path, but IS your path?"
  },
  {
    id: 30, title: "The Circle of Bread", subtitle: "A Middle Eastern parable",
    theme: "generosity", themeLabel: "Generosity & Trust",
    body: `<p>In a village on the edge of a great desert, there was a tradition. Whenever a family baked bread — and every family baked bread, because bread was life in the desert — they would bake one extra loaf and leave it on their doorstep. Any traveler, any neighbor, any stranger passing through could take it. No questions asked. No payment expected.</p>
<p>The tradition had existed for as long as anyone could remember, and it worked because everyone participated. If you baked four loaves, you left one on the step. If you baked six, you left one. The math was simple: one family alone couldn't feed the village. But every family, each contributing one loaf, created an abundance that no single family could have achieved.</p>
<p>Then a new family moved to the village. The father, a merchant named Hakim, was a careful man. He had grown up in a city where generosity was often exploited, where kindness was taken advantage of. When he saw the bread on the doorsteps, his first thought was not "how beautiful" but "how foolish." Anyone could take the bread — even people who didn't need it. Even people who hadn't contributed. The system, to Hakim, was inefficient and naive.</p>
<p>So Hakim's family did not leave bread on their doorstep. They baked their four loaves and kept all four. Hakim felt clever. He had beaten the system. He had four loaves instead of three.</p>
<p>At first, nothing changed. The other families continued their tradition. But over the weeks, a subtle shift occurred. Hakim's nearest neighbor, who had always left bread on her step, noticed that Hakim didn't. She began to feel foolish for giving when others didn't. She reduced her offering to half a loaf. The family across the road saw this and stopped leaving bread entirely. "If they're not doing it, why should we?" Within a few months, the doorsteps were bare.</p>
<p>And then the drought came.</p>
<p>It was a bad one — the kind that kills crops and dries wells. In the past, the village had survived droughts because of the bread tradition. Families who had flour shared with families who didn't. The doorstep loaves became a lifeline. The tradition wasn't just generosity; it was infrastructure. It was the invisible safety net that kept the village alive in hard times.</p>
<p>Without it, families hoarded. Doors closed. The village fractured. Hakim's family had enough flour to last a few weeks. But flour without community is just powder. When his daughter got sick and needed medicine from the healer on the other side of the village, no one was willing to help carry her there. When his well ran dry, no one offered to share theirs. The connections that the bread tradition had built — the trust, the goodwill, the sense of mutual obligation — had evaporated along with the bread.</p>
<p>It was Hakim's wife, Leila, who understood first. "We didn't just stop leaving bread," she told Hakim. "We stopped being part of the village." The next morning, Leila baked their last flour into four loaves. She kept three for the family. And she placed the fourth on the doorstep.</p>
<p>Their neighbor saw it. She baked a loaf and left it on her step. The family across the road did the same. Within a week, the doorsteps were full again. The trust returned slowly — bread by bread, loaf by loaf — and the village survived the drought the way it always had: together.</p>`,

<p>Astronaut Ron Garan described it this way: he was outside the International Space Station on a spacewalk, replacing a pump, when he looked up from his work and saw the Earth. He had seen it before, through the station's windows. But this time, floating in the void, he saw it differently. He saw a thin, bright blue line curving along the planet's edge — the atmosphere. That blue line, he realized, was everything. Every breath anyone had ever taken. Every cloud, every storm, every sunset. Every sound that had ever been heard. The entirety of human history — every war, every love story, every song, every conversation — had happened within that paper-thin shell of air.</p>
<p>"I was struck by the sobering contradiction between the beauty of our planet and the unfortunate realities of life on our planet," he wrote later. From space, there are no borders. No lines between countries. No divisions between races or religions or economic classes. There is only the Earth — small, luminous, fragile, and alive — floating in an incomprehensible darkness.</p>
<p>The astronaut Edgar Mitchell, who walked on the moon during Apollo 14, described the feeling as "an explosion of awareness." He looked back at the Earth — a tiny blue marble suspended in black — and felt a profound connection to every living thing on it. "You develop an instant global consciousness," he said. "You look at the planet and you think: that's all of us. All of it. Everyone I've ever known, everyone who has ever lived, is on that little blue dot."</p>

// ─── STATE MANAGEMENT (in-memory, dashboard-integratable) ───
const STATE_KEY = 'sarah_daily_story_state';

// ── Cloud Sync (Cloudflare Worker KV) ──
const _PROXY = 'https://anthropic-proxy.shelikag.workers.dev';
const _dirty = new Set();
let _ft = null;
function _isSyncable(k) { return k === STATE_KEY; }
function _markDirty(k) { if (!_isSyncable(k)) return; _dirty.add(k); if (_ft) clearTimeout(_ft); _ft = setTimeout(_flush, 3000); }
async function _flush() {
  if (!_dirty.size) return; const keys=[..._dirty]; _dirty.clear(); _ft=null;
  for (const k of keys) { try { const v=localStorage.getItem(k); if(v===null) continue;
    await fetch(`${_PROXY}/config/${encodeURIComponent(k)}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:v});
  } catch(e){} } console.log(`[CloudSync:Story] Pushed ${keys.length} keys`);
}
window.addEventListener('beforeunload', () => { if(!_dirty.size) return; const keys=[..._dirty]; _dirty.clear();
  for (const k of keys) { const v=localStorage.getItem(k); if(v===null) continue; navigator.sendBeacon(`${_PROXY}/config/${encodeURIComponent(k)}`,v); }
});
const _origSet = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(k,v) { _origSet(k,v); _markDirty(k); };

async function _hydrateFromCloud() {
  try { const r=await fetch(`${_PROXY}/config-all`); if(!r.ok) return false; const d=await r.json();
    let n=0; for (const [k,v] of Object.entries(d)) { if(!_isSyncable(k)) continue; if(v===null) continue;
      const loc=localStorage.getItem(k); if(!loc||loc==='null') { _origSet(k, typeof v==='string'?v:JSON.stringify(v)); n++; }
    } if(n) console.log(`[CloudSync:Story] Hydrated ${n} keys`); return n>0;
  } catch(e){ return false; }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { readStories: [], reflections: {}, currentIndex: getTodayStoryIndex() };
}

function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
}

// Hydrate from cloud then load state
let state;
try {
  state = loadState();
  // Async hydrate — re-render if cloud had newer data
  _hydrateFromCloud().then(hydrated => {
    if (hydrated) { state = loadState(); if (typeof render === 'function') render(); }
  }).catch(()=>{});
} catch(e) {
  state = { readStories: [], reflections: {}, currentIndex: getTodayStoryIndex() };
}

// ─── HELPERS ───
function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / (1000 * 60 * 60 * 24));
}

function getTodayStoryIndex() { return getDayOfYear() % STORIES.length; }

let currentIndex = state.currentIndex || getTodayStoryIndex();
let speechSynth = window.speechSynthesis;
let speaking = false;
let listOpen = false;

function formatDate() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function getThemeClass(t) {
  const m = { persistence:'theme-persistence', gratitude:'theme-gratitude', kindness:'theme-kindness', hardwork:'theme-hardwork', failure:'theme-failure', generosity:'theme-generosity', courage:'theme-courage', humility:'theme-humility', empathy:'theme-empathy', honesty:'theme-honesty', responsibility:'theme-responsibility', patience:'theme-patience', selfbelief:'theme-selfbelief' };
  return m[t] || 'theme-persistence';
}

function getThemeIcon(t) {
  const m = { persistence:'🏔️', gratitude:'🙏', kindness:'💛', hardwork:'⛏️', failure:'💡', generosity:'🌉', courage:'🦁', humility:'🏺', empathy:'👁️', honesty:'⭐', responsibility:'🏠', patience:'🌱', selfbelief:'✨' };
  return m[t] || '📖';
}

function isRead(id) { return state.readStories.includes(id); }

function toggleRead(id) {
  if (isRead(id)) {
    state.readStories = state.readStories.filter(x => x !== id);
  } else {
    state.readStories.push(id);
  }
  saveState(); render();
}

function getReflection(id) { return state.reflections[id] || ''; }

function saveReflection(id) {
  const el = document.getElementById('reflection-input');
  if (el) {
    state.reflections[id] = el.value;
    saveState();
    const status = document.getElementById('save-status');
    if (status) { status.classList.add('visible'); setTimeout(() => status.classList.remove('visible'), 2000); }
  }
}

function toggleSpeech() {
  if (speaking) { speechSynth.cancel(); speaking = false; render(); return; }
  const story = STORIES[currentIndex];
  const text = story.body.replace(/<[^>]*>/g, '') + ' ' + story.moral;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.92; u.pitch = 1;
  u.onend = () => { speaking = false; render(); };
  speechSynth.speak(u); speaking = true; render();
}

function navigate(dir) {
  speechSynth.cancel(); speaking = false;
  currentIndex = (currentIndex + dir + STORIES.length) % STORIES.length;
  state.currentIndex = currentIndex; saveState();
  render(); window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToStory(idx) {
  speechSynth.cancel(); speaking = false;
  currentIndex = idx; state.currentIndex = currentIndex; saveState();
  listOpen = false; render(); window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleList() { listOpen = !listOpen; render(); }

function allRead() { return state.readStories.length >= STORIES.length; }

// ─── RENDER ───
function render() {
  const story = STORIES[currentIndex];
  const isToday = currentIndex === getTodayStoryIndex();
  const readCount = state.readStories.length;
  const totalCount = STORIES.length;
  const pct = Math.round((readCount / totalCount) * 100);

  const weekDots = Array.from({length: 7}, (_, i) => {
    const filled = i <= (getDayOfYear() % 7);
    return `<div class="streak-dot ${filled ? 'filled' : ''}"></div>`;
  }).join('');

  const storyListHTML = STORIES.map((s, i) =>
    `<div class="story-list-item ${i === currentIndex ? 'active' : ''}" onclick="goToStory(${i})">
      <div class="list-read-dot ${isRead(s.id) ? 'read' : ''}"></div>
      <span class="list-item-title">${s.title}</span>
      <span class="list-item-theme">${s.themeLabel}</span>
    </div>`
  ).join('');

  const allReadBanner = allRead() ? `
    <div class="all-read-banner">
      <h3>🎉 You've Read Every Story!</h3>
      <p>Incredible, Sarah! You've finished all ${totalCount} stories in the collection. Every one of these morals is now part of how you see the world.</p>
      <p>Want more stories? Ask your parent to generate a fresh batch — just tell them:</p>
      <p style="font-style:italic; color:#6a5040;">"Sarah has read all ${totalCount} stories. Can you generate 15 more in the same style?"</p>
      <button class="generate-btn" onclick="alert('Let your parent know you\\'re ready for more stories! They can ask Claude to generate a new set.')">🪶 Request More Stories</button>
    </div>
  ` : '';

  app.innerHTML = `
    <div class="story-header">
      <div class="story-date">${formatDate()}</div>
      <div class="story-greeting">${isToday ? "Today's story for Sarah" : "From the story collection"}</div>
    </div>

    <div class="streak-bar">
      <span style="font-size:20px">📖</span>
      <span class="streak-text">Reading Streak</span>
      <div class="streak-dots">${weekDots}</div>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">Stories Read</span>
        <span class="progress-count">${readCount} / ${totalCount} (${pct}%)</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width: ${pct}%"></div>
      </div>
    </div>

    ${allReadBanner}

    <div class="story-list-toggle">
      <button class="list-toggle-btn" onclick="toggleList()">
        ${listOpen ? '▲ Hide' : '▼ Browse'} All Stories
      </button>
    </div>

    <div class="story-list ${listOpen ? 'open' : ''}">${storyListHTML}</div>

    <div style="text-align:center">
      <span class="theme-badge ${getThemeClass(story.theme)}">
        ${getThemeIcon(story.theme)} ${story.themeLabel}
      </span>
    </div>

    <div class="story-card">
      <div class="story-title-row">
        <h1 class="story-title">${story.title}</h1>
        <button class="read-mark-btn ${isRead(story.id) ? 'is-read' : ''}" onclick="toggleRead(${story.id})">
          ${isRead(story.id) ? '✓ Read' : '○ Mark Read'}
        </button>
      </div>
      <div class="story-subtitle">${story.subtitle}</div>
      <div class="story-body">${story.body}</div>

      <div class="story-divider"></div>

      <div class="moral-section">
        <div class="moral-label">The Moral</div>
        <div class="moral-text">${story.moral}</div>
      </div>

      <div class="reflection-section">
        <div class="reflection-label">Something to Think About</div>
        <div class="reflection-text">${story.reflection}</div>
        <textarea
          id="reflection-input"
          class="reflection-textarea"
          placeholder="Write your thoughts here, Sarah..."
          oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';"
        >${getReflection(story.id)}</textarea>
        <div class="reflection-save-row">
          <button class="save-btn" onclick="saveReflection(${story.id})">💾 Save My Thoughts</button>
          <span id="save-status" class="save-status">✓ Saved!</span>
        </div>
      </div>

      <div class="action-row">
        <button class="read-aloud-btn ${speaking ? 'playing' : ''}" onclick="toggleSpeech()">
          ${speaking ? '⏹ Stop Reading' : '🔊 Read Aloud'}
        </button>
      </div>
    </div>

    <div class="story-nav">
      <button class="nav-btn" onclick="navigate(-1)">← Previous</button>
      <span class="story-counter">Story ${currentIndex + 1} of ${STORIES.length}</span>
      <button class="nav-btn" onclick="navigate(1)">Next →</button>
    </div>
  `;
}

render();
</script>
</body>
</html>
