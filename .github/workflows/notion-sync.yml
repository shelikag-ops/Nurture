name: Sync Dashboard → Notion

on:
  push:
    paths:
      - 'notion-sync-queue.json'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync queue to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          const NOTION_TOKEN   = process.env.NOTION_TOKEN;
          const ACTIVITY_DB    = '3b959280-4d96-4681-873f-8fe9c3399ee5';
          const VOCAB_DB       = '3fadc4dd-9254-4ad3-9e04-f4ff219fe94f';

          if (!NOTION_TOKEN) { console.error('NOTION_TOKEN secret is not set'); process.exit(1); }

          const queue = JSON.parse(fs.readFileSync('notion-sync-queue.json', 'utf8'));
          console.log(`Queue date: ${queue.syncDate}  |  activities: ${(queue.activities||[]).length}`);

          async function notionPost(endpoint, body) {
            const res = await fetch(`https://api.notion.com/v1/${endpoint}`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${NOTION_TOKEN}`,
                'Content-Type': 'application/json',
                'Notion-Version': '2022-06-28'
              },
              body: JSON.stringify(body)
            });
            if (!res.ok) {
              const err = await res.text();
              throw new Error(`Notion ${endpoint} → ${res.status}: ${err}`);
            }
            return res.json();
          }

          async function main() {
            // ── Activity Log entries ──────────────────────────────
            for (const act of (queue.activities || [])) {
              const props = {
                'Activity': { title: [{ text: { content: act.activity } }] },
                'Subject':  { select: { name: act.subject } },
                'Type':     { select: { name: act.type || 'Planned' } },
                'Date':     { date:   { start: act.date } },
              };
              if (act.duration) props['Duration (min)'] = { number: act.duration };
              if (act.week)     props['Week'] = { rich_text: [{ text: { content: act.week } }] };

              await notionPost('pages', { parent: { database_id: ACTIVITY_DB }, properties: props });
              console.log(`  ✅ Activity: ${act.subject} — ${act.activity}`);
            }

            // ── Vocabulary Sprint Tracker entry ───────────────────
            const v = queue.vocab;
            if (v && v.newWordsToday > 0) {
              await notionPost('pages', {
                parent: { database_id: VOCAB_DB },
                properties: {
                  'Date':              { title:    [{ text: { content: v.date } }] },
                  'New words today':   { number:   v.newWordsToday },
                  'Running total':     { number:   v.runningTotal },
                  'Words remaining':   { number:   v.wordsRemaining },
                  'vocab.com session': { checkbox: !!v.vocabComSession },
                  'Revision done':     { checkbox: !!v.revisionDone },
                }
              });
              console.log(`  ✅ Vocab: +${v.newWordsToday} words (total ${v.runningTotal})`);
            }

            console.log('Notion sync complete.');
          }

          main().catch(e => { console.error('Sync failed:', e.message); process.exit(1); });
          SCRIPT
