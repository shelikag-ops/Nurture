name: Daily News Content

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST (00:30 UTC) every day
  workflow_dispatch:        # allows manual "Run workflow" trigger

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate news content via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/generate-news.py

      - name: Commit updated news content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-content.json
          git diff --staged --quiet || git commit -m "chore: daily news content $(date -u +%Y-%m-%d)"
          git push
